bio: |
  I am a Ph.D. candidate working on soft robotic grippers, intrinsic force sensing,
  physics-guided learning, nonlinear structural modeling, and data-driven inverse problems.

  My research focuses on inferring contact forces from structural deformation in flexible
  robotic systems by combining mechanics-based modeling, simulation-to-real transfer,
  and machine learning.

